<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de Moyenne</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --primary: #16a34a;
            --box-green-bg: #f0fdf4;
            --box-green-border: #bbf7d0;
            --box-green-hover: #e6f4ea;
            --danger: #dc2626;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .wrapper {
            width: 100%;
            max-width: 700px;
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        header p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .modules-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .row {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr;
            align-items: center;
            padding: 1rem;
            background: var(--box-green-bg);
            border: 1px solid var(--box-green-border);
            border-radius: 12px;
            gap: 1rem;
            transition: all 0.2s ease;
        }

        .row:hover {
            background: var(--box-green-hover);
            border-color: #86efac;
        }

        .module-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .module-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #14532d;
        }

        .module-name.rtl {
            direction: rtl;
            text-align: right;
        }

        .module-coeff {
            font-size: 0.75rem;
            color: #166534;
            font-weight: 500;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .input-wrapper label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #166534;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--box-green-border);
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: all 0.15s;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .score-display {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
        }

        .score-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #166534;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .score-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .score-value.pass { color: var(--primary); }
        .score-value.fail { color: var(--danger); }

        .summary-card {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-left h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .summary-left p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .global-average {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text-secondary);
        }

        .global-average.pass { color: var(--primary); }
        .global-average.fail { color: var(--danger); }

        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.025em;
        }

        @media (max-width: 640px) {
            .wrapper { padding: 1.25rem; }
            .row { grid-template-columns: 1fr 1fr; gap: 1rem; padding: 1.25rem; }
            .module-info { grid-column: span 2; border-bottom: 1px dashed var(--box-green-border); padding-bottom: 0.5rem; }
            .module-name.rtl { text-align: left; }
            .score-display { align-items: flex-start; grid-column: span 2; margin-top: 0.25rem; padding-top: 0.5rem; border-top: 1px dashed var(--box-green-border); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>Calculateur de Moyenne</h1>
            <p>Master e-Management</p>
        </header>

        <div class="modules-container" id="modulesList"></div>

        <div class="summary-card">
            <div class="summary-left">
                <h2>Moyenne Générale</h2>
                <p>Coefficient Global: <span id="displayTotalCoeff">15</span></p>
            </div>
            <div class="global-average" id="globalAverage">0.00</div>
        </div>

        <footer>
            ( powered by aymen laouedj )
        </footer>
    </div>

<script>
    const dataset = [
        { name: "e-crm", coeff: 2 },
        { name: "الذكاء الإقتصادي", coeff: 2, rtl: true },
        { name: "e-scm", coeff: 2 },
        { name: "methadology", coeff: 2 },
        { name: "e-project managment", coeff: 2 },
        { name: "أساليب كمية للإدارة", coeff: 2, rtl: true }, 
        { name: "قانون العقود الإلكترونية", coeff: 2, rtl: true }, 
        { name: "english", coeff: 1 }
    ];

    const container = document.getElementById('modulesList');
    let totalCoeff = 0;

    dataset.forEach((item) => {
        totalCoeff += item.coeff;
        const row = document.createElement('div');
        row.className = 'row';
        row.setAttribute('data-coeff', item.coeff);
        
        const alignmentClass = item.rtl ? 'module-name rtl' : 'module-name';

        row.innerHTML = `
            <div class="module-info">
                <span class="${alignmentClass}">${item.name}</span>
                <span class="module-coeff">Coefficient: ${item.coeff}</span>
            </div>
            <div class="input-wrapper">
                <label>Note TD</label>
                <input type="number" class="td-input" min="0" max="20" step="0.25" placeholder="00" oninput="runCalculations()">
            </div>
            <div class="input-wrapper">
                <label>Cours</label>
                <input type="number" class="cours-input" min="0" max="20" step="0.25" placeholder="00" oninput="runCalculations()">
            </div>
            <div class="score-display">
                <span class="score-label">Moyenne</span>
                <span class="score-value module-output">0.00</span>
            </div>
        `;
        container.appendChild(row);
    });

    document.getElementById('displayTotalCoeff').innerText = totalCoeff;

    function runCalculations() {
        const rows = document.querySelectorAll(".row");
        let aggregatedPoints = 0;
        const fixedTotalCoeff = 15; 

        rows.forEach(row => {
            const tdVal = row.querySelector(".td-input").value;
            const coursVal = row.querySelector(".cours-input").value;
            const coeff = parseFloat(row.getAttribute("data-coeff"));
            const outputElement = row.querySelector(".module-output");

            if (tdVal !== "" || coursVal !== "") {
                const td = parseFloat(tdVal) || 0;
                const cours = parseFloat(coursVal) || 0;
                
                const moduleAvg = (td * 0.4) + (cours * 0.6);
                outputElement.innerText = moduleAvg.toFixed(2);
                
                if (moduleAvg >= 10) {
                    outputElement.className = "score-value pass";
                } else {
                    outputElement.className = "score-value fail";
                }
                
                aggregatedPoints += (moduleAvg * coeff);
            } else {
                outputElement.innerText = "0.00";
                outputElement.className = "score-value";
            }
        });

        const finalAverage = aggregatedPoints / fixedTotalCoeff;
        const globalDisplay = document.getElementById("globalAverage");
        
        globalDisplay.innerText = finalAverage.toFixed(2);

        if (aggregatedPoints > 0) {
            if (finalAverage >= 10) {
                globalDisplay.className = "global-average pass";
            } else {
                globalDisplay.className = "global-average fail";
            }
        } else {
            globalDisplay.className = "global-average";
            globalDisplay.innerText = "0.00";
        }
    }
</script>
</body>
</html>
