<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calculateur de Moyenne</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#f5f7fb;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --line:#e2e8f0;

    --primary:#10b981;
    --primary-soft:#ecfdf5;

    --danger:#ef4444;
    --danger-soft:#fef2f2;

    --shadow:
    0 1px 2px rgba(15,23,42,.04),
    0 8px 24px rgba(15,23,42,.06);

    --radius:18px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:
    radial-gradient(circle at top left,#ecfdf5 0%,transparent 25%),
    radial-gradient(circle at bottom right,#eff6ff 0%,transparent 25%),
    var(--bg);

    min-height:100vh;
    padding:32px 16px;
    color:var(--text);

    display:flex;
    justify-content:center;
}

.wrapper{
    width:100%;
    max-width:760px;
}

.hero{
    margin-bottom:24px;
    text-align:center;
}

.hero h1{
    font-size:2rem;
    font-weight:800;
    letter-spacing:-0.04em;
    margin-bottom:8px;
}

.hero p{
    color:var(--muted);
    font-size:.95rem;
}

.modules{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.card{
    background:var(--card);
    border:1px solid rgba(226,232,240,.8);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:var(--shadow);

    display:grid;
    grid-template-columns:2fr 1fr 1fr auto;
    gap:18px;
    align-items:center;

    transition:
    transform .2s ease,
    border-color .2s ease,
    box-shadow .2s ease;
}

.card.english{
    grid-template-columns:2fr 1fr auto;
}

.card:hover{
    transform:translateY(-2px);
    border-color:#cbd5e1;
}

.module{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.module-name{
    font-size:1rem;
    font-weight:700;
    letter-spacing:-0.02em;
}

.module-name.rtl{
    direction:rtl;
    text-align:right;
}

.module-coeff{
    font-size:.78rem;
    color:var(--muted);
    font-weight:600;
}

.field{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.field label{
    font-size:.72rem;
    color:var(--muted);
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
}

.input-wrap{
    position:relative;
}

input{
    width:100%;
    border:1px solid var(--line);
    background:#fafcff;

    padding:14px 12px;
    border-radius:14px;

    font-size:1rem;
    font-weight:600;
    color:var(--text);

    text-align:center;

    transition:
    border-color .2s ease,
    background .2s ease,
    box-shadow .2s ease;
}

input:focus{
    outline:none;
    border-color:var(--primary);
    background:#fff;
    box-shadow:0 0 0 4px rgba(16,185,129,.08);
}

input::-webkit-inner-spin-button,
input::-webkit-outer-spin-button{
    -webkit-appearance:none;
    margin:0;
}

.score-box{
    min-width:92px;
    text-align:right;
}

.score-label{
    font-size:.7rem;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--muted);
    font-weight:700;
    margin-bottom:6px;
}

.score{
    font-size:1.4rem;
    font-weight:800;
    letter-spacing:-0.04em;
    color:var(--muted);

    transition:color .2s ease;
}

.score.pass{
    color:var(--primary);
}

.score.fail{
    color:var(--danger);
}

.summary{
    margin-top:28px;

    background:var(--card);
    border-radius:24px;

    padding:24px;
    box-shadow:var(--shadow);

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:18px;
}

.summary-left{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.summary-left span:first-child{
    font-size:.78rem;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--muted);
    font-weight:700;
}

.summary-left span:last-child{
    font-size:.95rem;
    color:var(--muted);
}

.summary-input{
    width:160px;
}

.global{
    font-size:3rem;
    font-weight:800;
    letter-spacing:-0.06em;
    color:var(--muted);

    transition:color .2s ease;
}

.global.pass{
    color:var(--primary);
}

.global.fail{
    color:var(--danger);
}

.footer{
    margin-top:18px;
    text-align:center;
    font-size:.72rem;
    color:var(--muted);
    letter-spacing:.04em;
}

@media(max-width:700px){

.card,
.card.english{
    grid-template-columns:1fr;
}

.score-box{
    text-align:left;
}

.summary{
    flex-direction:column;
    align-items:flex-start;
}

.summary-input{
    width:100%;
}

.global{
    font-size:2.4rem;
}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="hero">
    <h1>Calculateur de Moyenne</h1>
    <p>Master 1 E-Management - TD 40% · Cours 60% </p><br>
    <p>Welcome ratrapage hater</p>
</div>

<div class="modules" id="modules"></div>

<div class="summary">
    <div class="summary-left">
        <span>S2 Moyenne</span>
        <span>Total coefficient : <strong id="coeffDisplay"></strong></span>
    </div>

    <div class="global" id="globalAverage">0.00</div>
</div>

<div class="summary">
    <div class="summary-left">
        <span>S1 Moyenne</span>
        <span>Entrez votre moyenne du semestre 1</span>
    </div>

    <div class="summary-input">
        <input
        type="number"
        id="s1Average"
        min="0"
        max="20"
        step="0.01"
        placeholder="00">
    </div>
</div>

<div class="summary">
    <div class="summary-left">
        <span>Moyenne Annuelle</span>
        <span>(Moyenne S1 + S2 ) / 2</span>
    </div>

    <div class="global" id="annualAverage">0.00</div>
</div>

<div class="footer">
    © 2026 Master 1 E-Management
</div>

</div>

<script>
const data = [
 {name:"e-crm",coeff:2},
 {name:"الذكاء الإقتصادي",coeff:2},
 {name:"إدارة سلسلة الإمداد الإلكترونية",coeff:2},
 {name:"منهجية إعداد مذكرة الماستر",coeff:2},
 {name:"إدارة المشاريع الإلكترونية",coeff:2},
 {name:"أساليب كمية للإدارة",coeff:2,rtl:true},
 {name:"قانون العقود الإلكترونية",coeff:2,rtl:true},
 {name:"english",coeff:1,coursOnly:true}
];

const container = document.getElementById("modules");

const TOTAL_COEFF = data.reduce((a,b)=>a+b.coeff,0);

document.getElementById("coeffDisplay").textContent = TOTAL_COEFF;

data.forEach((m,index)=>{

const card = document.createElement("div");

card.className = m.coursOnly ? "card english" : "card";

card.innerHTML = `
<div class="module">
    <div class="module-name ${m.rtl ? 'rtl' : ''}">
        ${m.name}
    </div>

    <div class="module-coeff">
        Coefficient ${m.coeff}
    </div>
</div>

${m.coursOnly ? '' : `
<div class="field">
    <label>TD</label>

    <div class="input-wrap">
        <input
        type="number"
        class="td"
        min="0"
        max="20"
        step="0.25"
        placeholder="00">
    </div>
</div>
`}

<div class="field">
    <label>Cours</label>

    <div class="input-wrap">
        <input
        type="number"
        class="cc"
        min="0"
        max="20"
        step="0.25"
        placeholder="00">
    </div>
</div>

<div class="score-box">
    <div class="score-label">
        Moyenne
    </div>

    <div class="score">
        --
    </div>
</div>
`;

container.appendChild(card);
});

document.addEventListener("input",e=>{

if(!e.target.matches(".td,.cc,#s1Average")) return;

calculate();

});

function calculate(){

let total = 0;
let completedCoeff = 0;

document.querySelectorAll(".card").forEach((card,index)=>{

const tdInput = card.querySelector(".td");
const ccInput = card.querySelector(".cc");

const tdValue = tdInput ? tdInput.value : "";
const ccValue = ccInput.value;

const score = card.querySelector(".score");
const module = data[index];

if(module.coursOnly){

    if(ccValue === ""){
        score.textContent = "--";
        score.className = "score";
        return;
    }

    const cc = Math.min(20,Math.max(0,parseFloat(ccValue)));
    const avg = cc;

    score.textContent = avg.toFixed(2);
    score.className = `score ${avg >= 10 ? 'pass' : 'fail'}`;

    total += avg * module.coeff;
    completedCoeff += module.coeff;

    return;
}

if(tdValue === "" || ccValue === ""){

score.textContent = "--";
score.className = "score";

return;

}

const td = Math.min(20,Math.max(0,parseFloat(tdValue)));
const cc = Math.min(20,Math.max(0,parseFloat(ccValue)));

const avg = td * 0.4 + cc * 0.6;

score.textContent = avg.toFixed(2);

score.className =
`score ${avg >= 10 ? 'pass' : 'fail'}`;

total += avg * module.coeff;
completedCoeff += module.coeff;

});

const global = completedCoeff === TOTAL_COEFF ? total / TOTAL_COEFF : 0;

const globalElement =
document.getElementById("globalAverage");

globalElement.textContent =
global.toFixed(2);

globalElement.className =
`global ${global >= 10 ? 'pass' : 'fail'}`;

if(completedCoeff !== TOTAL_COEFF){

globalElement.textContent = "0.00";
globalElement.className = "global";

}

calculateAnnual(global, completedCoeff === TOTAL_COEFF);
}

function calculateAnnual(global, hasGlobal){

const s1Value = document.getElementById("s1Average").value;
const annualElement = document.getElementById("annualAverage");

if(!hasGlobal || s1Value === ""){

annualElement.textContent = "0.00";
annualElement.className = "global";

return;

}

const s1 = Math.min(20,Math.max(0,parseFloat(s1Value)));
const annual = (global + s1) / 2;

annualElement.textContent = annual.toFixed(2);
annualElement.className =
`global ${annual >= 10 ? 'pass' : 'fail'}`;
}
</script>

</body>
</html>
